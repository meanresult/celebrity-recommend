# Local public sharing overlay.
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.share.yaml --profile quick-share up -d --build caddy cloudflared-quick
#
# Public traffic flow:
#   Cloudflare Tunnel -> caddy:8080 -> tagscope-frontend / tagscope-backend

services:
  tagscope-backend:
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: !reset []
    expose:
      - "8000"

  tagscope-frontend:
    build:
      context: .
      dockerfile: docker/TagscopeFrontendDockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        INTERNAL_API_URL: "http://tagscope-backend:8000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      INTERNAL_API_URL: "http://tagscope-backend:8000"
    ports: !reset []
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    ports:
      - "8088:8080"
    volumes:
      - ./docker/Caddyfile.share:/etc/caddy/Caddyfile:ro
    depends_on:
      - tagscope-frontend
      - tagscope-backend
    restart: unless-stopped

  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://caddy:8080
    depends_on:
      - caddy
    profiles:
      - quick-share
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - caddy
    profiles:
      - share
    restart: unless-stopped
