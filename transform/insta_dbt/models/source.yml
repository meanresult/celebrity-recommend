version: 2

sources:
  - name: instagram_raw
    schema: RAW_DATA
    description: 태그+포스팅별로 데이터 정리

    tables:
      - name: instagram_posts
        description: 인스타그램 원본 데이터
        
        columns:
            # 브랜드 선정 
          - name: brand_name
            description: 브랜드 주제
            tests:
              - not_null
          - name: brand_id
            description: 브랜드 주제 id

            # 해당 브랜드를 태그한 계정 정보
          - name: post_id
            description: 포스팅 게시물 ID
            tests:
              - not_null
              - unique
          - name: insta_id
            description: 인스타그램 계정 ID
          - name: insta_name
            description: 인스타그램 프로필 표시명. 없으면 unknown
          - name: full_link
            description: 포스팅 게시물 링크
          - name: img_src
            description: 태그된 이미지 링크 
          - name: post_date
            description: 포스팅 날짜

            # 해당 게시물에 태드된 다른 계정 정보  
          - name: tagged_insta_id
            description: 그 게시물에 태그된 다른 인스타그램 계정
          - name: tagged_insta_id_cnt
            description: 그 게시물에 태그된 다른 인스타그램 계정 수
